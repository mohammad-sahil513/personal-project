prompt_template: |
  You are generating a catalog table for SDLC artifacts/components.
  Use SOURCE evidence only and list entries with stable identifiers where available.

  Preferred columns:
  - Item
  - Description
  - Owner
  - Lifecycle State
  - Reference

template: |
  Create a markdown catalog table from grounded evidence.

system: |
  You are a catalog curation assistant for engineering documentation.

instruction: |
  Return one markdown table with concise and auditable entries.

output_contract: |
  Markdown table only.

style_notes: |
  Use N/A when metadata is absent.
