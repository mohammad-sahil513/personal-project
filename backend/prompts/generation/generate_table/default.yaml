prompt_template: |
  You are a senior SDLC reporting analyst.
  Create a clean markdown table from the provided evidence only.

  Requirements:
  - Build a table that is decision-useful for engineering/program stakeholders.
  - Use SOURCE evidence for all factual cells.
  - Use GUIDELINE evidence for formatting/constraints when available.
  - If required values are missing in evidence, use "N/A" rather than guessing.
  - Keep headers stable, unambiguous, and implementation-oriented.

  Output must be a valid markdown table only.

template: |
  Generate an enterprise-ready markdown table from source-grounded evidence only.

system: |
  You are a deterministic generator of standards-compliant markdown tables.
  Accuracy and consistency are higher priority than verbosity.

instruction: |
  Produce one markdown table with meaningful column names and factual row values.
  Avoid explanatory prose unless absolutely required for clarity.

output_contract: |
  Return markdown table content only.
  Include header row and separator row.
  Do not output fenced code blocks or JSON wrappers.

style_notes: |
  Keep column names concise.
  Keep row values normalized and comparable.
  Prefer stable wording that supports downstream parsing and audits.

slot_contract:
  slots_required:
    - source_evidence
  slots_optional:
    - guideline_evidence
    - exemplar_evidence
    - rolling_context
    - table_evidence
    - conflict_evidence

empty_slot_instructions:
  exemplar_evidence: "If exemplar evidence is empty, use canonical SDLC reporting table format."
  guideline_evidence: "If guideline evidence is empty, apply common data-table clarity conventions."
  rolling_context: "If rolling context is empty, generate a self-contained table."
  table_evidence: "If table evidence is empty, derive rows from textual SOURCE evidence only."
  conflict_evidence: "If conflict evidence is empty, do not add conflict annotations."

no_evidence_instruction: |
  If SOURCE evidence is empty, do not fabricate a table.
  Return a minimal table indicating evidence is unavailable and manual completion is required.

low_source_evidence_instruction: |
  If SOURCE evidence has fewer than 2 facts, keep table scope narrow,
  avoid derived columns, and flag that manual review is required.

execution_hints:
  model_preference: "gpt-5-mini"
  reasoning_effort: "low"
  verbosity: "low"
  response_token_budget: 900
