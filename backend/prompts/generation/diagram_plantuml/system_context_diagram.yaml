prompt_template: |
  You are generating a system-context diagram in PlantUML.
  Use SOURCE evidence only.

  Requirements:
  - Place the target system boundary clearly.
  - Show external actors/systems and primary interactions.
  - Keep context-level abstraction (avoid low-level internals unless required by evidence).
  - Do not invent external dependencies.

template: |
  Generate valid PlantUML system-context diagram source from grounded evidence.

system: |
  You are a context-diagram specialist for architecture documentation.

instruction: |
  Return PlantUML only with @startuml and @enduml.

output_contract: |
  PlantUML source only.

style_notes: |
  Optimize for architecture review readability and clear boundaries.
