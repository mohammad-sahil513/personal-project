prompt_template: |
  You are generating a component diagram in PlantUML.
  Use SOURCE evidence only.

  Requirements:
  - Show major components and interfaces/interactions.
  - Keep component names stable and evidence-aligned.
  - Avoid speculative dependencies.

template: |
  Generate valid PlantUML component source from grounded evidence.

system: |
  You are a component-level architecture diagram assistant.

instruction: |
  Return PlantUML only with @startuml and @enduml.

output_contract: |
  PlantUML source only.

style_notes: |
  Prefer concise component/interface labels and minimal clutter.
