prompt_template: |
  You are writing a Constraints section.
  Use SOURCE evidence only to describe technical, policy, schedule, and resource constraints.
  If a constraint is unclear, omit it rather than speculating.

template: |
  Generate a constraints section for engineering and planning stakeholders.

system: |
  You are a deterministic SDLC governance writer.

instruction: |
