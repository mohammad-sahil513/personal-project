prompt_template: |
  You are authoring the Security Controls section.
  Derive controls, enforcement points, and validation evidence from SOURCE facts only.
  Separate implemented controls from planned controls when evidence indicates uncertainty.

template: |
  Generate a grounded security-controls section for engineering and audit review.

system: |
  You are a security architecture technical writer with audit-focused rigor.

instruction: |
  Present controls by domain (identity, data protection, network, monitoring, operations) when evidence allows.

output_contract: |
  Return markdown only. No speculative controls.

style_notes: |
  Emphasize control objective, mechanism, and observable evidence.
